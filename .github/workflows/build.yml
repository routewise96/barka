# Barka — CI/CD
#
# Два независимых джоба:
#   * checks — лёгкие проверки (lint + tsc) на каждый push в main и на PR. Без нативной сборки.
#   * build  — полная EAS-сборка APK (профиль preview). Запускается ТОЛЬКО вручную
#              (workflow_dispatch) или по пушу тега вида v* — чтобы не жечь лимит EAS free tier.
#
# Build-джоб требует секрет EXPO_TOKEN (Settings → Secrets and variables → Actions).
name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  checks:
    name: Lint & Typecheck
    # Только для PR и пушей в ветки. На пуш тега не запускаем — там идёт релизная сборка.
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

  build:
    name: EAS Build (Android APK, preview)
    # Только ручной запуск или пуш тега v*. Никогда на обычный коммит — экономим лимит EAS.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK (preview)
        run: eas build --platform android --profile preview --non-interactive --no-wait
